<!-- #region Modal Price Low -->
<div class="modal-price" id="modal-low" data-modal-low>
  <div class="modal-container">
    <button class="btn-modal-close" type="button" data-modal-low-close>
      <svg class="btn-modal-close-icon" width="32" height="32">
        <use href="../img/sprite.svg#icon-close"></use>
      </svg>
    </button>
    <ul class="modal-text-list">
      <li class="modal-text-item">
        <p class="modal-text-title">Join Now!</p>
      </li>
      <li class="modal-text-item">
        <p class="modal-text-content">One Session</p>
      </li>
      <li class="modal-text-item">
        <p class="modal-text-price">$10</p>
      </li>
    </ul>
    <form class="modal-form">
      <div class="modal-form-wrapper">
        <label class="modal-label" for="your-name">Your Name</label>
        <input
          class="modal-input"
          type="text"
          id="your-name"
          required
          placeholder="Your Name"
        />
      </div>
      <div class="wrapper-contacts">
        <div class="modal-form-wrapper">
          <label class="modal-label" for="your-email">Email</label>
          <input
            class="modal-input"
            type="email"
            id="your-email"
            required
            placeholder="Email"
          />
        </div>
        <div class="modal-form-wrapper">
          <label class="modal-label" for="your-phone">Phone number</label>
          <input
            class="modal-input"
            type="tel"
            id="your-phone"
            required
            placeholder="Phone number"
          />
        </div>
      </div>
      <button class="modal-form-btn" type="submit">Go to checkout</button>
    </form>
  </div>
</div>
<!-- #endregion Modal Price Low -->
