<section class="hero" id="hero">
<picture class="hero-picture">

      media="(min-width: 1366px)"
      srcset="
        /img/webp/hero-img/Yoga_sunset-d.webp    1x,
        /img/webp/hero-img/Yoga_sunset-d@2x.webp 2x
      "
    />
    <source
      media="(min-width: 768px)"
      srcset="
        /img/webp/hero-img/Yoga_sunset-t.webp    1x,
        /img/webp/hero-img/Yoga_sunset-t@2x.webp 2x
      "
    />
    <img
      class="hero-img" 
      src="/img/webp/hero-img/Yoga_sunset-m.webp"

        /img/webp/hero-img/Yoga_sunset-m.webp    1x,
        /img/webp/hero-img/Yoga_sunset-m@2x.webp 2x
      "

    <div>
      <h1 class="hero-title">Transform Your Life with Our Yoga Clases</h1>
      <p class="hero-description">

    <div class="hero-anchor-btn">
      <a class="hero-link-join" href="#pricing">Join Now

      <a class="hero-link-learn" href="#gallery">Learn More
      </a>
